name: Master Pre-Release

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  prerelease:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # full history so we can read tags and build the changelog
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Determine next version (3.0.x+1)
        id: version
        run: |
          # Newest existing tag of the form v3.0.<patch>-dev.<build>. Patch is what we
          # increment; build is this workflow's own run number, so it plays no part in
          # ordering tags here — only the patch does.
          LAST_TAG=$(git tag -l 'v3.0.*-dev.*' --sort=-v:refname | head -n1)

          if [ -z "$LAST_TAG" ]; then
            NEXT_PATCH=1
            echo "No previous v3.0.*-dev.* tag found, starting at 3.0.1"
          else
            LAST_PATCH=$(echo "$LAST_TAG" | sed -E 's/^v3\.0\.([0-9]+)-dev\.[0-9]+$/\1/')
            NEXT_PATCH=$((LAST_PATCH + 1))
            echo "Last tag: $LAST_TAG -> next patch: $NEXT_PATCH"
          fi

          VERSION="3.0.$NEXT_PATCH"
          TAG="v$VERSION-dev.${{ github.run_number }}"
          echo "version=$VERSION"        >> $GITHUB_OUTPUT
          echo "patch=$NEXT_PATCH"       >> $GITHUB_OUTPUT
          echo "tag=$TAG"                >> $GITHUB_OUTPUT
          echo "last_tag=$LAST_TAG"      >> $GITHUB_OUTPUT

      - name: Build (DEV)
        run: ./gradlew build -x test
          -Ppolocloud.version.major=3
          -Ppolocloud.version.minor=0
          -Ppolocloud.version.patch=${{ steps.version.outputs.patch }}
          -Ppolocloud.version.channel=DEV
          -Ppolocloud.version.build=${{ github.run_number }}

      - name: Generate changelog
        id: changelog
        run: |
          RANGE_START="${{ steps.version.outputs.last_tag }}"

          if [ -z "$RANGE_START" ]; then
            RANGE="HEAD"
          else
            RANGE="$RANGE_START..HEAD"
          fi

          {
            echo "## What's Changed"
            echo ""
            git log "$RANGE" \
              --no-merges \
              --pretty=format:"- %s (%h) by @%an" \
              | sed 's/@\([^ ]*\) /@\1 /'
            echo ""
            echo ""
            if [ -n "$RANGE_START" ]; then
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${RANGE_START}...${{ steps.version.outputs.tag }}"
            fi
          } > CHANGELOG.md

          echo "Generated changelog:"
          cat CHANGELOG.md

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: PoloCloud ${{ steps.version.outputs.version }} (dev build ${{ github.run_number }})
          body_path: CHANGELOG.md
          prerelease: true
          draft: false
          files: runner/build/libs/*.jar