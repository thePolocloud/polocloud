syntax = "proto3";

package service;

option java_package = "de.polocloud.proto";
option java_outer_classname = "ServicesProto";
option java_multiple_files = true;

import "common.proto";

service ServiceManager {
  rpc ListServices (ListServicesRequest) returns (ListServicesResponse);
  // Lets a node ask a peer to stop a service that is actually running there, so the CLI's
  // `service <name> shutdown` works regardless of which node's terminal session issued it.
  rpc StopService (StopServiceRequest) returns (StopServiceResponse);
  // Streams a service's buffered recent log lines followed by its live output, so the
  // CLI's `service <name> logs` can tail a service that is running on another node.
  rpc StreamServiceLogs (StreamServiceLogsRequest) returns (stream ServiceLogLine);
  // Lets a node ask a peer to run a console command in a service that is actually
  // running there, so the CLI's `service <name> execute` works regardless of which
  // node's terminal session issued it.
  rpc ExecuteServiceCommand (ExecuteServiceCommandRequest) returns (ExecuteServiceCommandResponse);
  // Lets a node ask a peer to stop every locally-running/queued service of a group, so
  // deleting a group (see GroupApiService.DeleteGroup) never leaves orphaned processes —
  // or Service rows that would otherwise trip the groups table's foreign-key constraint —
  // on other nodes.
  rpc StopGroupServices (StopGroupServicesRequest) returns (StopGroupServicesResponse);
  // Lets a node ask a peer for a service's live CPU/memory usage, so the CLI's
  // `service <name>` info view works regardless of which node's terminal session
  // issued it — mirrors StopService.
  rpc GetServiceResourceUsage (GetServiceResourceUsageRequest) returns (GetServiceResourceUsageResponse);
}

message StopServiceRequest {
  string service_name = 1;
}

message StopServiceResponse {
  bool stopped = 1;
  // Set when stopped is false (e.g. the service is not actually running on the node
  // that received the request).
  string message = 2;
}

message StreamServiceLogsRequest {
  string service_name = 1;
}

message ServiceLogLine {
  string line = 1;
}

message ExecuteServiceCommandRequest {
  string service_name = 1;
  string command = 2;
}

message ExecuteServiceCommandResponse {
  bool executed = 1;
  // Set when executed is false (e.g. the service is not running on the node that
  // received the request, or its process already exited).
  string message = 2;
}

message StopGroupServicesRequest {
  string group_name = 1;
}

message StopGroupServicesResponse {
  int32 stopped_count = 1;
}

message GetServiceResourceUsageRequest {
  string service_name = 1;
}

message GetServiceResourceUsageResponse {
  bool found = 1;
  // Set when found is false (e.g. the service is not actually running on the node
  // that received the request).
  string message = 2;
  // Percent, 0-100, as last sampled by the node's resource sampler.
  double cpu_usage = 3;
  // Resident memory in MB, as last sampled by the node's resource sampler.
  double used_memory = 4;
  int64 pid = 5;
}

// API-facing service surface used by the standalone Polocloud API (plugins/services).
//
// Deliberately kept separate from the CLI-oriented ServiceManager above so the two
// can evolve independently (mirroring GroupApiService in group.proto):
//   - ServiceManager / ProtoServiceProcessData  -> consumed by the CLI
//   - ServiceApiService / ServiceData           -> consumed by the plugin/service SDK
// The message shapes intentionally differ; do not merge them without also reworking
// both consumers.
service ServiceApiService {
  rpc FindServices (ServiceListRequest) returns (ServiceListResponse);
}

message ServiceListRequest {
  optional string group_filter = 1;
  optional string state_filter = 2;
  // When true, the receiving node returns only its own local services and does not
  // fan out to peers — set by an aggregating node to prevent recursion (mirrors
  // ListServicesRequest.local_only).
  bool local_only = 3;
}

message ServiceListResponse {
  repeated ServiceData services = 1;
}

message ServiceData {
  string id = 1;
  int32 index = 2;
  string group = 3;
  string state = 4;
  int32 port = 5;
  int64 pid = 6;
  // Host the service is reachable on (e.g. the node's address). Lets a remote
  // proxy connect to services that are not co-located on its own host.
  string host = 7;
  // Free-form key/value properties attached to this service.
  map<string, string> properties = 8;
  // Players currently connected, as last reported by the node's SLP ping. 0 until
  // the first successful ping. Read-only: only the node's ping loop updates this.
  int32 online_players = 9;
  // Configured player slots, as last reported by the node's SLP ping. 0 until the
  // first successful ping. Read-only: only the node's ping loop updates this.
  int32 max_players = 10;
  // MOTD text from the last successful SLP ping. Empty until the first successful
  // ping. Read-only: only the node's ping loop updates this.
  string motd = 11;
  // CPU usage percent (0-100), as last sampled by the node's resource sampler. 0
  // until the first sample. Read-only: only the sampler updates this.
  double cpu_usage = 12;
  // Resident memory in MB, as last sampled by the node's resource sampler. 0 until
  // the first sample. Read-only: only the sampler updates this.
  double used_memory = 13;
}

message ListServicesRequest {
  // optional Filter
  string plan_name = 1;
  string node_id = 2;
  common.ServiceState state = 3;
  // When true, the receiving node returns only its own local services and does not
  // fan out to peers. Set by a node aggregating the cluster-wide view to prevent
  // infinite recursion between nodes.
  bool local_only = 4;
}

message ListServicesResponse {
  repeated ProtoServiceProcessData service_process = 1;
}

message ProtoServiceProcessData {
  string uuid = 1;
  int32 index = 2;
  string plan = 3;
  string node_id = 4;
  int32 bound_port = 5;
  int32 pid = 6;
  // Lifecycle state name (e.g. RUNNING). A string — like ServiceData.state — so the
  // node/shared ServiceState maps losslessly without squeezing into the coarser
  // common.ServiceState enum.
  string state = 7;
  // Free-form key/value properties attached to this service.
  map<string, string> properties = 8;
  // Players currently connected, as last reported by the node's SLP ping. 0 until
  // the first successful ping. Read-only: only the node's ping loop updates this.
  int32 online_players = 9;
  // Configured player slots, as last reported by the node's SLP ping. 0 until the
  // first successful ping. Read-only: only the node's ping loop updates this.
  int32 max_players = 10;
  // MOTD text from the last successful SLP ping. Empty until the first successful
  // ping. Read-only: only the node's ping loop updates this.
  string motd = 11;
}

message ProtoServiceControlPlan {
  string name = 1;
  string version = 2;
  bool unique_use = 3;
  bool required_on_node = 4;
  int32 minimum = 5;
  int32 maximum = 6;
  string node_whitelist = 7;
}